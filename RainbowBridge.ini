[custom]
;不要随意改变关键字，否则会导致出错
;基于 acl4SSR 规则增强

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位
;注意：
;1) Clash 按规则从前到后匹配，命中即停止，重复规则以前面的为准。
;2) 自有规则放在 acl4SSR 规则前，确保可优先生效。
;3) subconverter 可能使用远程 ruleset 缓存（日志会出现 CACHE HIT），排查时需先刷新缓存。
